services:
  backend:
    image: 166799230506.dkr.ecr.eu-west-3.amazonaws.com/homelab:latest
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}

  frontend:
    image: 166799230506.dkr.ecr.eu-west-3.amazonaws.com/homelab-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}      # reads from .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skander -d calcdb"]
      interval: 5s
      retries: 5

volumes:
  postgres_data: