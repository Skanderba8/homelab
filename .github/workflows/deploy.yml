name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force full build and deploy (use after infra rebuild)'
        required: false
        default: 'false'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend.Dockerfile'
              - 'main.py'
            frontend:
              - 'frontend.Dockerfile'
              - 'index.html'
              - 'nginx.conf'

  build-and-push:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event.inputs.force_build == 'true'
    outputs:
      pull_args: ${{ steps.set-pull-args.outputs.pull_args }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BUILD_BACKEND: ${{ needs.changes.outputs.backend }}
          BUILD_FRONTEND: ${{ needs.changes.outputs.frontend }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          if [ "$BUILD_BACKEND" = "true" ] || [ "$FORCE_BUILD" = "true" ]; then
            docker build -t $ECR_REGISTRY/homelab-backend:$IMAGE_TAG -t $ECR_REGISTRY/homelab-backend:latest -f backend.Dockerfile .
            docker push $ECR_REGISTRY/homelab-backend:$IMAGE_TAG
            docker push $ECR_REGISTRY/homelab-backend:latest
          fi
          if [ "$BUILD_FRONTEND" = "true" ] || [ "$FORCE_BUILD" = "true" ]; then
            docker build -t $ECR_REGISTRY/homelab-frontend:$IMAGE_TAG -t $ECR_REGISTRY/homelab-frontend:latest -f frontend.Dockerfile .
            docker push $ECR_REGISTRY/homelab-frontend:$IMAGE_TAG
            docker push $ECR_REGISTRY/homelab-frontend:latest
          fi

      - name: Set pull args
        id: set-pull-args
        env:
          BUILD_BACKEND: ${{ needs.changes.outputs.backend }}
          BUILD_FRONTEND: ${{ needs.changes.outputs.frontend }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          if [ "$FORCE_BUILD" = "true" ]; then
            echo "pull_args=backend frontend" >> $GITHUB_OUTPUT
          else
            ARGS=""
            [ "$BUILD_BACKEND" = "true" ] && ARGS="$ARGS backend"
            [ "$BUILD_FRONTEND" = "true" ] && ARGS="$ARGS frontend"
            echo "pull_args=$ARGS" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-and-push]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event.inputs.force_build == 'true'
    steps:
      - name: SSH and deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PULL_ARGS: ${{ needs.build-and-push.outputs.pull_args }}
        run: |
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/homelab && git pull origin main && docker compose pull $PULL_ARGS && docker compose up -d"
          rm /tmp/deploy_key

  deploy-infra:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'false' && needs.changes.outputs.frontend == 'false' && github.event.inputs.force_build != 'true'
    steps:
      - name: SSH and apply compose changes
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/homelab && git pull origin main && docker compose up -d --no-pull"
          rm /tmp/deploy_key