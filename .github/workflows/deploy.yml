name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build Backend (Now using backend.Dockerfile and homelab-backend repo)
          docker build -t $ECR_REGISTRY/homelab-backend:$IMAGE_TAG -t $ECR_REGISTRY/homelab-backend:latest -f backend.Dockerfile .
          docker push $ECR_REGISTRY/homelab-backend:latest
          
          # Build Frontend (Using frontend.Dockerfile and homelab-frontend repo)
          docker build -t $ECR_REGISTRY/homelab-frontend:$IMAGE_TAG -t $ECR_REGISTRY/homelab-frontend:latest -f frontend.Dockerfile .
          docker push $ECR_REGISTRY/homelab-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH and deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/homelab && git pull origin main && docker compose pull && docker compose up -d"
          rm /tmp/deploy_key